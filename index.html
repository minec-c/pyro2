<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2604262100</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #000000;
            color: #ffffff;
            font-size: 16px;
        }
        .info {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<div class = "container">
  <textarea id="darkTextArea" placeholder="Connecting..." disable></textarea>
  <div class="info" id="status">Connecting to ... </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const textArea = document.getElementById('darkTextArea');
    const statusDisplay = document.getElementById('status');

    // Config fields we need to collect
    const fields = [
        { key: 'apiKey', message: "API Key (39 chars, a-z, A-Z, 0-9, -, _):", pattern: /^[a-zA-Z0-9-_]{39}$/ },
        { key: 'name', message: "Project Name (6 chars, alphanumeric):", pattern: /^[a-zA-Z0-9]{6}$/ },
        { key: 'messagingSenderId', message: "Messaging Sender ID (12 numbers):", pattern: /^\d{12}$/ },
        { key: 'appIdSuffix', message: "App ID suffix (22 chars, alphanumeric):", pattern: /^[a-zA-Z0-9]{22}$/ }
    ];

    const data = {};
    let currentFieldIndex = 0;
    let firebaseInitialized = false;
    let db, docRef;

    function updateInfo() {
        if (firebaseInitialized) return;
        const remaining = fields.length - currentFieldIndex;
        if (currentFieldIndex < fields.length) {
            statusDisplay.textContent = `Right-click or tap to enter: ${fields[currentFieldIndex].key} | ${remaining} left`;
        }
    }

    function askNextField() {
        if (currentFieldIndex >= fields.length || firebaseInitialized) return;

        const field = fields[currentFieldIndex];
        const v = prompt(field.message);

        if (v && field.pattern.test(v)) {
            data[field.key] = v;
            currentFieldIndex++;

            if (currentFieldIndex === fields.length) {
                initFirebase();
            } else {
                updateInfo();
            }
        } else if (v!== null) {
            alert(`Invalid ${field.key}`);
        }
    }

    function initFirebase() {
        const firebaseConfig = {
            apiKey: data.apiKey,
            authDomain: `${data.name}.firebaseapp.com`,
            databaseURL: `https://${data.name}-default-rtdb.firebaseio.com`,
            projectId: data.name,
            storageBucket: `${data.name}.firebasestorage.app`,
            messagingSenderId: data.messagingSenderId,
            appId: `1:${data.messagingSenderId}:web:${data.appIdSuffix}`
        };

        const app = initializeApp(firebaseConfig);
        db = getDatabase(app);
        docRef = ref(db, 'document');
        firebaseInitialized = true;

        statusDisplay.textContent = "Connecting to Firebase...";
        setupRealtimeSync();
    }

    function setupRealtimeSync() {
        onValue(docRef, (snapshot) => {
            const data = snapshot.val() || {};
            const serverText = data.text || "";
            if (!isTyping) {
                const cursorPos = textArea.selectionStart;
                textArea.value = serverText;
                textArea.selectionStart = textArea.selectionEnd = Math.min(cursorPos, textArea.value.length);
            }
            updateStatus(textArea.value);
            textArea.disabled = false;
            textArea.placeholder = "Type here...";
        });
    }

    // Desktop: right-click to trigger next prompt
    document.addEventListener('contextmenu', (e) => {
        if (!firebaseInitialized) {
            e.preventDefault();
            askNextField();
        }
    });

    // Mobile: single tap anywhere to trigger next prompt
    let touchTimer;
    document.addEventListener('touchstart', (e) => {
        if (firebaseInitialized || e.target === textArea) return;
        touchTimer = setTimeout(() => touchTimer = null, 500); // Not a long press
    });

    document.addEventListener('touchend', (e) => {
        if (firebaseInitialized || e.target === textArea) return;
        if (touchTimer) { // Quick tap, not scroll/long-press
            e.preventDefault();
            askNextField();
        }
    });

    // Your existing typing/save logic
    let lastSavedText = "";
    function saveNow(text) {
        if (text === lastSavedText ||!firebaseInitialized) return;
        lastSavedText = text;
        set(docRef, {
            text,
            lastWrite: Date.now()
        }).then(() => {
            localStorage.removeItem('draft');
        }).catch(err => {
            console.error("Write failed:", err);
            statusDisplay.textContent = "Save failed - wait 10s or check rules";
        });
    }

    let saveTimeout;
    let isTyping = false;
    let typingTimeout;
    textArea.addEventListener('input', () => {
        isTyping = true;
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            isTyping = false;
        }, 1500);

        localStorage.setItem('draft', textArea.value);
        const text = textArea.value;
        updateStatus(text);

        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            saveNow(text);
        }, 3000);
    });

    function updateStatus(text) {
        const lineCount = text.split('\n').length;
        const charCount = text.length;
        if (firebaseInitialized) {
            statusDisplay.textContent = `Lines: ${lineCount} | Characters: ${charCount}`;
        }
    }

    // Init
    textArea.disabled = true;
    updateInfo();
</script>
</body>
</html>
