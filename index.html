<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2604262100</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #000000;
            color: #ffffff;
            font-size: 16px;
        }
        .info {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<div class = "container">
  <textarea id="darkTextArea" placeholder="Connecting..." disabled></textarea>
  <div class="info" id="status">Connecting to ... </div>
</div>

<script type="module">


    const textArea = document.getElementById('darkTextArea');
    const statusDisplay = document.getElementById('status');

    // Config fields we need to collect
    const fields = [
        { key: 'apiKey', message: "AP (39):", pattern: /^[a-zA-Z0-9-_]{39}$/ },
        { key: 'baas', message: "BA (8):", pattern: /^[a-z]{8}$/ },
        { key: 'name', message: "NA (6):", pattern: /^[a-zA-Z0-9]{6}$/ },
        { key: 'messagingSenderId', message: "ME (12):", pattern: /^\d{12}$/ },
        { key: 'appIdSuffix', message: "SF (22):", pattern: /^[a-zA-Z0-9]{22}$/ }
    ];

    const data = {};
    let currentFieldIndex = 0;
    let BaasInizd = false;
    let db, docRef;

    function updateInfo() {
        if (BaasInizd) return;
        const remaining = fields.length - currentFieldIndex;
        if (currentFieldIndex < fields.length) {
            statusDisplay.textContent = `Right-click or tap to enter: ${fields[currentFieldIndex].key} | ${remaining} left`;
        }
    }

    function askNextField() {
        if (currentFieldIndex >= fields.length || BaasInizd) return;

        const field = fields[currentFieldIndex];
        const v = prompt(field.message);

        if (v && field.pattern.test(v)) {
            data[field.key] = v;
            currentFieldIndex++;

            if (currentFieldIndex === fields.length) {
                iniBaas();
            } else {
                updateInfo();
            }
        } else if (v!== null) {
            alert(`Invalid ${field.key}`);
        }
    }



    async function loadBaas(baas) {
	    const appModule = await import(`https://www.gstatic.com/${baas}js/10.12.2/${baas}-app.js`);
	    const dbModule  = await import(`https://www.gstatic.com/${baas}js/10.12.2/${baas}-database.js`);
	
	    return {
	        initializeApp: appModule.initializeApp,
	        getDatabase: dbModule.getDatabase,
	        ref: dbModule.ref,
	        onValue: dbModule.onValue,
	        set: dbModule.set
	    };
    }

let fb = {};
async function iniBaas() {
    try {
        fb = await loadBaas(data.baas); // 🔒 fixed, not user input

        const baasConf = {
            apiKey: data.apiKey,
            authDomain: `${data.name}.${data.baas}app.com`,
            databaseURL: `https://${data.name}-default-rtdb.${data.baas}io.com`,
            projectId: data.name,
            storageBucket: `${data.name}.appspot.com`,
            messagingSenderId: data.messagingSenderId,
            appId: `1:${data.messagingSenderId}:web:${data.appIdSuffix}`
        };

        const app = fb.initializeApp(baasConf);
        db = fb.getDatabase(app);
        docRef = fb.ref(db, 'document');

        BaasInizd = true;
        setupRealtimeSync();

    } catch (e) {
        console.error(e);
        statusDisplay.textContent = "Failed to load backend";
    }
}

    function setupRealtimeSync() {
        fb.onValue(docRef, (snapshot) => {
            const data = snapshot.val() || {};
            const serverText = data.text || "";
            if (!isTyping) {
                const cursorPos = textArea.selectionStart;
                textArea.value = serverText;
                textArea.selectionStart = textArea.selectionEnd = Math.min(cursorPos, textArea.value.length);
            }
            updateStatus(textArea.value);
            textArea.disabled = false;
            textArea.placeholder = "Type here...";
        });
    }

    // Desktop: right-click to trigger next prompt
    document.addEventListener('contextmenu', (e) => {
        if (!BaasInizd) {
            e.preventDefault();
            askNextField();
        }
    });

    // Mobile: single tap anywhere to trigger next prompt
    let touchTimer;
    document.addEventListener('touchstart', (e) => {
        if (BaasInizd || e.target === textArea) return;
        touchTimer = setTimeout(() => touchTimer = null, 500); // Not a long press
    });

    document.addEventListener('touchend', (e) => {
        if (BaasInizd || e.target === textArea) return;
        if (touchTimer) { // Quick tap, not scroll/long-press
            e.preventDefault();
            askNextField();
        }
    });

    // Your existing typing/save logic
    let lastSavedText = "";
    function saveNow(text) {
        if (text === lastSavedText ||!BaasInizd) return;
        lastSavedText = text;
        fb.set(docRef, {
            text,
            lastWrite: Date.now()
        }).then(() => {
            localStorage.removeItem('draft');
        }).catch(err => {
            console.error("Write failed:", err);
            statusDisplay.textContent = "Save failed - wait 10s or check rules";
        });
    }

    let saveTimeout;
    let isTyping = false;
    let typingTimeout;
    textArea.addEventListener('input', () => {
        isTyping = true;
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            isTyping = false;
        }, 1500);

        localStorage.setItem('draft', textArea.value);
        const text = textArea.value;
        updateStatus(text);

        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            saveNow(text);
        }, 3000);
    });

    function updateStatus(text) {
        const lineCount = text.split('\n').length;
        const charCount = text.length;
        if (BaasInizd) {
            statusDisplay.textContent = `Lines: ${lineCount} | Characters: ${charCount}`;
        }
    }

    // Init
    textArea.disabled = true;
    updateInfo();
</script>
</body>
</html>
